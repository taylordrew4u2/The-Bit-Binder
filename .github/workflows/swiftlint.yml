name: Lint

# Runs SwiftLint on every push and pull request so style and common
# code-smell regressions surface as inline annotations on the diff.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging
